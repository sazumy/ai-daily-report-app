name: Track Member Review Started At

# 人間のメンバーが初めてレビューを提出したとき、GitHub Projects の
# "Member Review Started At" と "Wait for Human (min)" フィールドを更新する
# ※ ボット（type: Bot）のレビューは除外、既に設定済みの場合は上書きしない

on:
  pull_request_review:
    types: [submitted]

jobs:
  write-member-review-at:
    if: github.event.review.state != 'DISMISSED'
    runs-on: ubuntu-latest
    steps:
      - name: Write "Member Review Started At" and "Wait for Human (min)" to GitHub Projects
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            // ボットのレビューは除外
            const reviewerType  = context.payload.review.user.type;
            const reviewerLogin = context.payload.review.user.login;
            if (reviewerType === 'Bot') {
              core.info(`Reviewer ${reviewerLogin} is a bot. Skipping.`);
              return;
            }

            const prNodeId   = context.payload.pull_request.node_id;
            const reviewedAt = context.payload.review.submitted_at;
            const owner      = context.repo.owner;
            const projectNum = parseInt(process.env.PROJECT_NUMBER, 10);

            if (!projectNum) {
              core.setFailed('PROJECT_NUMBER variable is not set.');
              return;
            }

            // ── 1. プロジェクト ID とフィールド ID を取得 ──
            const { user } = await github.graphql(`
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2Field { id name dataType }
                      }
                    }
                  }
                }
              }
            `, { owner, number: projectNum });

            const project = user?.projectV2;
            if (!project) { core.setFailed(`Project #${projectNum} not found.`); return; }

            const fields            = project.fields.nodes;
            const memberReviewField = fields.find(f => f.name === 'Member Review Started At');
            const waitForHumanField = fields.find(f => f.name === 'Wait for Human (min)');

            if (!memberReviewField) { core.setFailed('"Member Review Started At" field not found.'); return; }

            // ── 2. PR のプロジェクトアイテム ID と既存フィールド値を取得 ──
            let itemId = null;
            let aiReviewAtValue = null;
            let alreadySet = false;
            let cursor = null;

            outer: while (true) {
              const data = await github.graphql(`
                query($projectId: ID!, $cursor: String) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 100, after: $cursor) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          id
                          content { ... on PullRequest { id } }
                          fieldValues(first: 20) {
                            nodes {
                              ... on ProjectV2ItemFieldTextValue {
                                field { ... on ProjectV2Field { name } }
                                text
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `, { projectId: project.id, cursor });

              const { nodes, pageInfo } = data.node.items;
              for (const item of nodes) {
                if (item.content?.id === prNodeId) {
                  itemId = item.id;
                  for (const fv of item.fieldValues.nodes) {
                    if (fv.field?.name === 'Member Review Started At' && fv.text) alreadySet = true;
                    if (fv.field?.name === 'AI Review Created At' && fv.text) aiReviewAtValue = fv.text;
                  }
                  break outer;
                }
              }
              if (!pageInfo.hasNextPage) break;
              cursor = pageInfo.endCursor;
            }

            if (!itemId) { core.warning('この PR はプロジェクトに追加されていません。スキップします。'); return; }
            if (alreadySet) { core.info('"Member Review Started At" は既に設定済みです。スキップします。'); return; }

            // ── 3. "Member Review Started At" を書き込む ──
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { text: $value }
                }) { projectV2Item { id } }
              }
            `, { projectId: project.id, itemId, fieldId: memberReviewField.id, value: reviewedAt });
            core.info(`✅ "Member Review Started At" を ${reviewedAt} に設定しました（PR: #${context.payload.pull_request.number}）`);

            // ── 4. "Wait for Human (min)" を計算して書き込む ──
            if (waitForHumanField && aiReviewAtValue) {
              const diffMin = Math.round((new Date(reviewedAt) - new Date(aiReviewAtValue)) / 60000);
              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Float!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { number: $value }
                  }) { projectV2Item { id } }
                }
              `, { projectId: project.id, itemId, fieldId: waitForHumanField.id, value: diffMin });
              core.info(`✅ "Wait for Human (min)" を ${diffMin} 分に設定しました`);
            } else if (!aiReviewAtValue) {
              core.warning('"AI Review Created At" が未設定のため "Wait for Human (min)" をスキップします。');
            }
