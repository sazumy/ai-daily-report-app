name: PR Lead Time

on:
  pull_request:
    types: [closed]

jobs:
  measure-lead-time:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Calculate lead time
        id: calc
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OPENED_AT="${{ github.event.pull_request.created_at }}"
          MERGED_AT="${{ github.event.pull_request.merged_at }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"

          # 初回レビュー時刻を取得（DISMISSED を除外し、submitted_at 昇順で最初の1件）
          FIRST_REVIEW_AT=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --jq '[.[] | select(.state != "DISMISSED")] | sort_by(.submitted_at) | first | .submitted_at // empty')

          OPENED_TS=$(date -d "$OPENED_AT" +%s)
          MERGED_TS=$(date -d "$MERGED_AT" +%s)
          TOTAL_DIFF=$((MERGED_TS - OPENED_TS))

          format_duration() {
            local diff=$1
            echo "$((diff / 3600))h $(((diff % 3600) / 60))m $((diff % 60))s"
          }

          TOTAL_LABEL=$(format_duration $TOTAL_DIFF)

          {
            echo "## PR Lead Time"
            echo ""
            echo "| 項目 | 値 |"
            echo "|------|----|"
            echo "| PR | [#${PR_NUMBER} ${{ github.event.pull_request.title }}](${{ github.event.pull_request.html_url }}) |"
            echo "| 作成者 | @${{ github.event.pull_request.user.login }} |"
            echo "| オープン日時 | ${OPENED_AT} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$FIRST_REVIEW_AT" ]; then
            FIRST_REVIEW_TS=$(date -d "$FIRST_REVIEW_AT" +%s)
            WAIT_DIFF=$((FIRST_REVIEW_TS - OPENED_TS))
            POST_REVIEW_DIFF=$((MERGED_TS - FIRST_REVIEW_TS))
            WAIT_LABEL=$(format_duration $WAIT_DIFF)
            POST_REVIEW_LABEL=$(format_duration $POST_REVIEW_DIFF)

            {
              echo "| 初回レビュー日時 | ${FIRST_REVIEW_AT} |"
              echo "| マージ日時 | ${MERGED_AT} |"
              echo ""
              echo "## 内訳"
              echo ""
              echo "| 区間 | 時間 |"
              echo "|------|------|"
              echo "| オープン → 初回レビュー（レビュー待ち） | ${WAIT_LABEL} |"
              echo "| 初回レビュー → マージ（レビュー後） | ${POST_REVIEW_LABEL} |"
              echo "| **合計リードタイム** | **${TOTAL_LABEL}** |"
            } >> "$GITHUB_STEP_SUMMARY"

            echo "wait_seconds=${WAIT_DIFF}" >> "$GITHUB_OUTPUT"
          else
            {
              echo "| マージ日時 | ${MERGED_AT} |"
              echo "| **合計リードタイム** | **${TOTAL_LABEL}** |"
              echo ""
              echo "> レビューなしでマージされました。"
            } >> "$GITHUB_STEP_SUMMARY"

            echo "wait_seconds=" >> "$GITHUB_OUTPUT"
          fi

          echo "opened_at=${OPENED_AT}" >> "$GITHUB_OUTPUT"
          echo "first_review_at=${FIRST_REVIEW_AT}" >> "$GITHUB_OUTPUT"
          echo "merged_at=${MERGED_AT}" >> "$GITHUB_OUTPUT"
          echo "total_seconds=${TOTAL_DIFF}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/spreadsheets

      - name: Write to Google Sheets
        run: |
          ACCESS_TOKEN="${{ steps.auth.outputs.access_token }}"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          BODY=$(jq -n \
            --arg now "$NOW" \
            --arg pr_number "${{ github.event.pull_request.number }}" \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg author "${{ github.event.pull_request.user.login }}" \
            --arg opened_at "${{ steps.calc.outputs.opened_at }}" \
            --arg first_review_at "${{ steps.calc.outputs.first_review_at }}" \
            --arg merged_at "${{ steps.calc.outputs.merged_at }}" \
            --arg wait_seconds "${{ steps.calc.outputs.wait_seconds }}" \
            --arg total_seconds "${{ steps.calc.outputs.total_seconds }}" \
            '{"values": [[$now, $pr_number, $title, $author, $opened_at, $first_review_at, $merged_at, $wait_seconds, $total_seconds]]}')

          curl -sf -X POST \
            "https://sheets.googleapis.com/v4/spreadsheets/${{ secrets.GOOGLE_SHEETS_ID }}/values/%E3%82%B7%E3%83%BC%E3%83%881!A:I:append?valueInputOption=USER_ENTERED" \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$BODY"

      - name: Write "Human Reviewing (min)" to GitHub Projects
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const prNodeId   = context.payload.pull_request.node_id;
            const mergedAt   = context.payload.pull_request.merged_at;
            const owner      = context.repo.owner;
            const projectNum = parseInt(process.env.PROJECT_NUMBER, 10);

            if (!projectNum) {
              core.warning('PROJECT_NUMBER variable is not set. Skipping.');
              return;
            }

            // ── 1. プロジェクト ID と "Human Reviewing (min)" フィールド ID を取得 ──
            const { user } = await github.graphql(`
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 50) {
                      nodes {
                        ... on ProjectV2Field { id name dataType }
                      }
                    }
                  }
                }
              }
            `, { owner, number: projectNum });

            const project = user?.projectV2;
            if (!project) { core.warning(`Project #${projectNum} not found. Skipping.`); return; }

            const humanReviewingField = project.fields.nodes.find(f => f.name === 'Human Reviewing (min)');
            if (!humanReviewingField) { core.warning('"Human Reviewing (min)" field not found. Skipping.'); return; }

            // ── 2. PR のプロジェクトアイテム ID と "Member Review Started At" を取得 ──
            let itemId = null;
            let memberReviewAtValue = null;
            let cursor = null;

            outer: while (true) {
              const data = await github.graphql(`
                query($projectId: ID!, $cursor: String) {
                  node(id: $projectId) {
                    ... on ProjectV2 {
                      items(first: 100, after: $cursor) {
                        pageInfo { hasNextPage endCursor }
                        nodes {
                          id
                          content { ... on PullRequest { id } }
                          fieldValues(first: 20) {
                            nodes {
                              ... on ProjectV2ItemFieldTextValue {
                                field { ... on ProjectV2Field { name } }
                                text
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `, { projectId: project.id, cursor });

              const { nodes, pageInfo } = data.node.items;
              for (const item of nodes) {
                if (item.content?.id === prNodeId) {
                  itemId = item.id;
                  for (const fv of item.fieldValues.nodes) {
                    if (fv.field?.name === 'Member Review Started At' && fv.text) {
                      memberReviewAtValue = fv.text;
                    }
                  }
                  break outer;
                }
              }
              if (!pageInfo.hasNextPage) break;
              cursor = pageInfo.endCursor;
            }

            if (!itemId) { core.warning('この PR はプロジェクトに追加されていません。スキップします。'); return; }
            if (!memberReviewAtValue) { core.warning('"Member Review Started At" が未設定のため "Human Reviewing (min)" をスキップします。'); return; }

            // ── 3. "Human Reviewing (min)" を計算して書き込む ──
            const diffMin = Math.round((new Date(mergedAt) - new Date(memberReviewAtValue)) / 60000);
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Float!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { number: $value }
                }) { projectV2Item { id } }
              }
            `, { projectId: project.id, itemId, fieldId: humanReviewingField.id, value: diffMin });
            core.info(`✅ "Human Reviewing (min)" を ${diffMin} 分に設定しました（PR: #${context.payload.pull_request.number}）`);

      - name: Write to Google Sheets (Apps Script)
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          BODY=$(jq -n \
            --arg now "$NOW" \
            --arg pr_number "${{ github.event.pull_request.number }}" \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg author "${{ github.event.pull_request.user.login }}" \
            --arg opened_at "${{ steps.calc.outputs.opened_at }}" \
            --arg first_review_at "${{ steps.calc.outputs.first_review_at }}" \
            --arg merged_at "${{ steps.calc.outputs.merged_at }}" \
            --arg wait_seconds "${{ steps.calc.outputs.wait_seconds }}" \
            --arg total_seconds "${{ steps.calc.outputs.total_seconds }}" \
            '{"now":$now,"pr_number":$pr_number,"title":$title,"author":$author,"opened_at":$opened_at,"first_review_at":$first_review_at,"merged_at":$merged_at,"wait_seconds":$wait_seconds,"total_seconds":$total_seconds}')

          REDIRECT_URL=$(curl -s -o /dev/null -w "%{redirect_url}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "https://script.google.com/macros/s/AKfycbxKd8CIMGgk_Ld-yPqfNGYbygtIUZ6A14SXVa3U5kAPmsuJgb-kZzByfsjbpJjTLcNUrQ/exec?token=${{ secrets.APPS_SCRIPT_TOKEN }}")

          curl -sf "$REDIRECT_URL"

